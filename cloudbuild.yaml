steps:
  # 1. Збірка образу (вказуємо шлях до Dockerfile та контекст папки)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/story-maker-web-front"
      - "-f"
      - "frontend/Dockerfile" # Шлях до твого Dockerfile
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL"
      - "./frontend" # Контекст збірки - папка фронтенду

  # 2. Пуш образу в реєстр
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/story-maker-web-front"

  # 3. Деплой у Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "story-maker-web-front"
      - "--image"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/story-maker-web-front"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

options:
  logging: CLOUD_LOGGING_ONLY
